<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L&M Imports | Vitrine Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #25d366; --dark: #121212; --light: #fdfdfd; --accent: #075e54; --soft-grey: #f0f2f5; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--light); margin: 0; color: var(--dark); padding-bottom: 50px; }

        header { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--dark); letter-spacing: -1px; }
        .logo span { color: var(--primary); }
        .admin-btn { background: var(--soft-grey); border: none; width: 40px; height: 40px; border-radius: 12px; cursor: pointer; color: #666; }

        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
        #products-grid { display: grid; grid-template-columns: 1fr; gap: 30px; }

        .card { background: white; border-radius: 24px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.03); display: flex; flex-direction: column; }
        .media-box { width: 100%; height: 380px; background: #f9f9f9; }
        .media-box img { width: 100%; height: 100%; object-fit: cover; }

        .info { padding: 25px; flex-grow: 1; }
        .info h3 { margin: 0 0 10px 0; font-size: 1.3rem; font-weight: 700; }
        .price { font-size: 1.5rem; font-weight: 800; color: var(--primary); margin-bottom: 20px; display: block; }
        
        .actions { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .btn { padding: 18px; border-radius: 18px; border: none; font-weight: 700; font-size: 1rem; cursor: pointer; text-align: center; text-decoration: none; }
        .btn-details { background: var(--soft-grey); color: #444; }
        .btn-wa { background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; gap: 10px; }

        .details-panel { display: none; padding: 25px; background: #fafafa; border-top: 1px solid #eee; line-height: 1.6; color: #555; }

        @keyframes pulse-wpp {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }
        .wpp-floating { position: fixed; bottom: 30px; right: 30px; background: var(--primary); color: white; width: 65px; height: 65px; border-radius: 22px; display: flex; align-items: center; justify-content: center; font-size: 32px; z-index: 900; animation: pulse-wpp 2s infinite; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(8px); }
        .modal-content { background: white; padding: 35px; border-radius: 30px; width: 95%; max-width: 500px; }
        input, textarea { width: 100%; padding: 15px; margin: 10px 0 20px; border: 2px solid var(--soft-grey); border-radius: 15px; font-size: 1rem; }

        @media (min-width: 768px) { #products-grid { grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); } }
    </style>
</head>
<body>

<header>
    <div class="logo">L&M <span>Imports</span></div>
    <button class="admin-btn" onclick="checkAdmin()"><i class="fa-solid fa-gear"></i></button>
</header>

<div class="container"><div id="products-grid"></div></div>

<a href="https://wa.me/5511999999999" class="wpp-floating" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>

<div id="adminModal" class="modal">
    <div class="modal-content">
        <h2 style="margin-top:0">Novo Produto</h2>
        <form id="productForm">
            <input type="text" id="pName" placeholder="Nome do Produto" required>
            <input type="text" id="pPrice" placeholder="Preço (ex: R$ 150,00)" required>
            <input type="text" id="pImg" placeholder="Link da Imagem (Imgur, etc)" required>
            <textarea id="pDesc" rows="4" placeholder="Descrição..."></textarea>
            <button type="submit" id="submitBtn" class="btn btn-wa" style="width:100%;">Publicar</button>
            <button type="button" onclick="closeModal()" style="width:100%; margin-top:10px; border:none; background:none; color:#999;">Cancelar</button>
        </form>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // --- CONFIGURAÇÃO JÁ COM SEUS DADOS ---
    const firebaseConfig = {
        apiKey: "AIzaSyD1q7f-AOe1brtS1lVyHEjnUamxuLGNtUc",
        authDomain: "lm-imports.firebaseapp.com",
        projectId: "lm-imports",
        storageBucket: "lm-imports.firebasestorage.app",
        messagingSenderId: "354232403670",
        appId: "1:354232403670:web:a42e289f44d8eb58362b77"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const prodCol = collection(db, "produtos");

    let isAdmin = false;
    window.checkAdmin = () => { if(prompt("Senha:") === "1234") { isAdmin = true; document.getElementById('adminModal').style.display = 'flex'; renderProducts(window.lastSnap); } };
    window.closeModal = () => document.getElementById('adminModal').style.display = 'none';

    document.getElementById('productForm').onsubmit = async (e) => {
        e.preventDefault();
        await addDoc(prodCol, {
            name: document.getElementById('pName').value,
            price: document.getElementById('pPrice').value,
            img: document.getElementById('pImg').value,
            desc: document.getElementById('pDesc').value,
            createdAt: Date.now()
        });
        closeModal();
        e.target.reset();
    };

    window.deleteProd = async (id) => { if(confirm("Excluir?")) await deleteDoc(doc(db, "produtos", id)); };
    window.toggleDetails = (id) => { const el = document.getElementById(`details-${id}`); el.style.display = el.style.display === 'block' ? 'none' : 'block'; };

    onSnapshot(query(prodCol, orderBy("createdAt", "desc")), (snap) => {
        window.lastSnap = snap;
        const grid = document.getElementById('products-grid');
        grid.innerHTML = "";
        snap.forEach(doc => {
            const p = doc.data();
            grid.innerHTML += `
                <div class="card">
                    <div class="media-box"><img src="${p.img}" loading="lazy"></div>
                    <div class="info">
                        <h3>${p.name}</h3>
                        <span class="price">${p.price}</span>
                        <div class="actions">
                            <button class="btn btn-details" onclick="toggleDetails('${doc.id}')">Mais detalhes</button>
                            <a class="btn btn-wa" href="https://wa.me/5511999999999?text=Interesse: ${p.name}" target="_blank">Negociar</a>
                        </div>
                    </div>
                    <div id="details-${doc.id}" class="details-panel">${p.desc}</div>
                    ${isAdmin ? `<button onclick="deleteProd('${doc.id}')" style="width:100%; border:none; color:red; padding:10px; cursor:pointer;">REMOVER</button>` : ''}
                </div>`;
        });
    });
</script>
</body>
</html>
