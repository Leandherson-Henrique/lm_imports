<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L&M Imports | Vitrine Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #25d366; --bg: #f8f9fa; --card-bg: #ffffff; --text: #121212; --border: rgba(0,0,0,0.08); }
        [data-theme="dark"] { --bg: #0f172a; --card-bg: #1e293b; --text: #f8f9fa; --border: rgba(255,255,255,0.1); }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; transition: background 0.3s, color 0.3s; }
        body { background: var(--bg); color: var(--text); padding-bottom: 100px; min-height: 100vh; }

        header { background: var(--card-bg); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
        .logo { font-size: 1.4rem; font-weight: 800; }
        .logo span { color: var(--primary); }
        .header-actions { display: flex; gap: 10px; }
        .btn-icon { background: var(--bg); border: 1px solid var(--border); color: var(--text); width: 40px; height: 40px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .container { max-width: 1200px; margin: 0 auto; padding: 15px; }
        #products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        @media (min-width: 768px) { #products-grid { grid-template-columns: repeat(4, 1fr); gap: 25px; } }

        .card { background: var(--card-bg); border-radius: 20px; overflow: hidden; border: 1px solid var(--border); position: relative; display: flex; flex-direction: column; }
        .media-container { width: 100%; aspect-ratio: 1/1; overflow-x: auto; display: flex; scroll-snap-type: x mandatory; scrollbar-width: none; background: #eee; }
        .media-container img { min-width: 100%; height: 100%; object-fit: cover; scroll-snap-align: start; cursor: zoom-in; }
        .stock-tag { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); color: white; padding: 4px 10px; border-radius: 8px; font-size: 0.65rem; font-weight: bold; z-index: 10; }

        .info { padding: 12px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .info h3 { font-size: 0.85rem; font-weight: 700; margin-bottom: 5px; height: 34px; overflow: hidden; }
        .price { font-size: 1.1rem; font-weight: 800; color: var(--primary); margin-bottom: 10px; }
        
        .btn-wa { background: var(--primary); color: white; text-decoration: none; text-align: center; padding: 12px; border-radius: 12px; font-weight: 700; font-size: 0.8rem; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-sold-out { background: #666; cursor: not-allowed; }

        #add-btn-float { display: none; position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--primary); color: white; border-radius: 50%; border: none; font-size: 24px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 500; cursor: pointer; }
        .admin-controls { display: none; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; }
        .btn-edit { background: #3b82f6; color: white; border: none; padding: 8px; border-radius: 8px; font-size: 0.65rem; font-weight: bold; cursor: pointer; }
        .btn-del { background: #ef4444; color: white; border: none; padding: 8px; border-radius: 8px; font-size: 0.65rem; font-weight: bold; cursor: pointer; }

        #edit-imgs-preview { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .preview-item { position: relative; aspect-ratio: 1/1; border-radius: 10px; overflow: hidden; border: 2px solid var(--border); background: #eee; }
        .preview-item img { width: 100%; height: 100%; object-fit: cover; }
        .btn-remove-img { position: absolute; top: 2px; right: 2px; background: #ef4444; color: white; border: none; width: 22px; height: 22px; border-radius: 50%; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; padding: 15px; backdrop-filter: blur(5px); }
        .modal-content { background: var(--card-bg); color: var(--text); padding: 25px; border-radius: 25px; width: 100%; max-width: 450px; max-height: 90vh; overflow-y: auto; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--border); border-radius: 10px; background: var(--bg); color: var(--text); }
        .main-btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .upload-area { border: 2px dashed var(--border); padding: 15px; text-align: center; border-radius: 15px; margin-bottom: 15px; cursor: pointer; }
    </style>
</head>
<body data-theme="light">

<header>
    <div class="logo">L&M <span>Imports</span></div>
    <div class="header-actions">
        <button class="btn-icon" onclick="toggleTheme()"><i class="fa-solid fa-moon"></i></button>
        <button class="btn-icon" id="login-btn" onclick="openLogin()"><i class="fa-solid fa-user-lock"></i></button>
        <button class="btn-icon" id="logout-btn" onclick="logout()" style="display:none; color:red;"><i class="fa-solid fa-right-from-bracket"></i></button>
    </div>
</header>

<div class="container"><div id="products-grid"></div></div>

<button id="add-btn-float" onclick="openProductModal()"><i class="fa-solid fa-plus"></i></button>

<div id="loginModal" class="modal">
    <div class="modal-content">
        <h3>Painel Admin</h3>
        <input type="text" id="admUser" placeholder="Usuário" autocomplete="off">
        <input type="password" id="admPass" placeholder="Senha" autocomplete="off">
        <button class="main-btn" onclick="handleLogin()">Entrar</button>
        <button onclick="closeModals()" style="width:100%; margin-top:10px; border:none; background:none; color:var(--text); opacity:0.5;">Fechar</button>
    </div>
</div>

<div id="productModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle" style="margin-bottom:15px">Produto</h3>
        <form id="productForm">
            <input type="hidden" id="pId">
            <input type="text" id="pName" placeholder="Nome do Produto" required>
            <input type="text" id="pPrice" placeholder="Valor" required onkeyup="formatarMoeda(this)">
            <input type="number" id="pStock" placeholder="Estoque" required>
            
            <div id="media-manager">
                <p style="font-size:0.75rem; font-weight:bold; margin-bottom:10px;">Imagens Selecionadas:</p>
                <div id="edit-imgs-preview"></div>
                <div class="upload-area" onclick="document.getElementById('pImgFiles').click()">
                    <i class="fa-solid fa-camera" style="font-size: 1.5rem; margin-bottom: 5px;"></i>
                    <p style="font-size: 0.8rem;">Adicionar Fotos (Até 6)</p>
                    <input type="file" id="pImgFiles" accept="image/*" multiple style="display:none" onchange="handleFileSelect(this)">
                </div>
            </div>

            <textarea id="pDesc" rows="3" placeholder="Descrição (Opcional)"></textarea>
            <button type="submit" id="submitBtn" class="main-btn">SALVAR</button>
            <button type="button" onclick="closeModals()" style="width:100%; margin-top:10px; border:none; background:none; color:var(--text); opacity:0.5;">Cancelar</button>
        </form>
    </div>
</div>

<div id="zoomModal" class="modal" onclick="this.style.display='none'"><img id="zoomImg" src="" style="max-width:100%; max-height:100%; object-fit:contain;"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, updateDoc, onSnapshot, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD1q7f-AOe1brtS1lVyHEjnUamxuLGNtUc",
        authDomain: "lm-imports.firebaseapp.com",
        projectId: "lm-imports",
        storageBucket: "lm-imports.firebasestorage.app",
        messagingSenderId: "354232403670",
        appId: "1:354232403670:web:a42e289f44d8eb58362b77"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);
    const prodCol = collection(db, "produtos");

    let isAdmin = false;
    let imagesToSave = [];

    window.openLogin = () => {
        document.getElementById('admUser').value = ""; // Limpa usuário ao abrir
        document.getElementById('admPass').value = ""; // Limpa senha ao abrir
        document.getElementById('loginModal').style.display = 'flex';
    };

    window.handleLogin = () => {
        if(document.getElementById('admUser').value === 'admin' && document.getElementById('admPass').value === 'Nosrednael@77') {
            isAdmin = true; localStorage.setItem('isL&MAdmin', 'true'); updateAdminUI(); closeModals();
        } else alert("Acesso Negado!");
    };

    window.logout = () => { isAdmin = false; localStorage.removeItem('isL&MAdmin'); location.reload(); };
    window.updateAdminUI = () => {
        document.getElementById('add-btn-float').style.display = isAdmin ? 'block' : 'none';
        document.getElementById('login-btn').style.display = isAdmin ? 'none' : 'flex';
        document.getElementById('logout-btn').style.display = isAdmin ? 'flex' : 'none';
        renderProducts();
    };

    window.closeModals = () => document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');

    window.handleFileSelect = (input) => {
        const files = Array.from(input.files);
        if(imagesToSave.length + files.length > 6) return alert("Máximo de 6 fotos!");
        files.forEach(file => {
            const reader = new FileReader();
            reader.onload = (e) => { imagesToSave.push({ file: file, url: e.target.result }); renderImgPreview(); };
            reader.readAsDataURL(file);
        });
        input.value = "";
    };

    window.renderImgPreview = () => {
        const container = document.getElementById('edit-imgs-preview');
        container.innerHTML = imagesToSave.map((img, idx) => `
            <div class="preview-item">
                <img src="${img.url}">
                <button type="button" class="btn-remove-img" onclick="removeImg(${idx})">×</button>
            </div>
        `).join('');
    };

    window.removeImg = (idx) => { imagesToSave.splice(idx, 1); renderImgPreview(); };

    window.openProductModal = (data = null) => {
        const f = document.getElementById('productForm');
        f.reset();
        imagesToSave = data ? (data.images || []).map(url => ({ file: null, url })) : [];
        document.getElementById('pId').value = data ? data.id : "";
        document.getElementById('pName').value = data ? data.name : "";
        document.getElementById('pPrice').value = data ? data.price : "R$ ";
        document.getElementById('pStock').value = data ? data.stock : "";
        document.getElementById('pDesc').value = data ? data.desc : "";
        renderImgPreview();
        document.getElementById('productModal').style.display = 'flex';
    };

    document.getElementById('productForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const id = document.getElementById('pId').value;
        btn.disabled = true; btn.innerText = "Sincronizando...";
        try {
            const finalUrls = [];
            for(let item of imagesToSave) {
                if(item.file) {
                    const sRef = ref(storage, `vitrine/${Date.now()}_${item.file.name}`);
                    const snap = await uploadBytes(sRef, item.file);
                    finalUrls.push(await getDownloadURL(snap.ref));
                } else { finalUrls.push(item.url); }
            }
            const pData = {
                name: document.getElementById('pName').value,
                price: document.getElementById('pPrice').value,
                stock: parseInt(document.getElementById('pStock').value),
                desc: document.getElementById('pDesc').value,
                images: finalUrls,
                updatedAt: Date.now()
            };
            if(id) await updateDoc(doc(db, "produtos", id), pData);
            else { pData.createdAt = Date.now(); await addDoc(prodCol, pData); }
            closeModals();
        } catch (err) { alert("Erro ao salvar!"); }
        btn.disabled = false; btn.innerText = "SALVAR";
    };

    let currentProds = [];
    onSnapshot(query(prodCol, orderBy("createdAt", "desc")), (snap) => {
        currentProds = snap.docs.map(d => ({id: d.id, ...d.data()}));
        renderProducts();
    });

    function renderProducts() {
        const grid = document.getElementById('products-grid');
        grid.innerHTML = "";
        currentProds.forEach(p => {
            const isOut = p.stock <= 0;
            const imgs = (p.images || []).map(i => `<img src="${i}" onclick="openZoom('${i}')">`).join('');
            grid.innerHTML += `
                <div class="card">
                    <span class="stock-tag">${isOut ? 'ESGOTADO' : 'Estoque: '+p.stock}</span>
                    <div class="media-container">${imgs}</div>
                    <div class="info">
                        <h3>${p.name}</h3>
                        <p class="price">${p.price}</p>
                        ${isOut ? 
                            `<span class="btn-wa btn-sold-out">ESGOTADO</span>` : 
                            `<a class="btn-wa" href="https://wa.me/5581984304478?text=Olá! Gostaria de negociar o produto: ${p.name}" target="_blank">
                                <i class="fa-brands fa-whatsapp"></i> NEGOCIAR
                            </a>`
                        }
                        <div class="admin-controls" style="display: ${isAdmin ? 'grid' : 'none'}">
                            <button class="btn-edit" onclick='openProductModal(${JSON.stringify(p).replace(/'/g, "&apos;")})'>EDITAR</button>
                            <button class="btn-del" onclick="confirm('Excluir?') && deleteDoc(doc(db,'produtos','${p.id}'))">APAGAR</button>
                        </div>
                    </div>
                </div>`;
        });
    }

    window.formatarMoeda = (i) => {
        let v = i.value.replace(/\D/g,'');
        v = (v/100).toFixed(2).replace(".",",");
        v = v.replace(/(\d)(\d{3}),/g, "$1.$2,");
        i.value = "R$ " + v;
    };
    window.toggleTheme = () => {
        const b = document.body; const isDark = b.getAttribute('data-theme') === 'dark';
        b.setAttribute('data-theme', isDark ? 'light' : 'dark');
        localStorage.setItem('theme', isDark ? 'light' : 'dark');
    };
    if(localStorage.getItem('theme') === 'dark') toggleTheme();
    if(localStorage.getItem('isL&MAdmin') === 'true') { isAdmin = true; updateAdminUI(); }
    window.openZoom = (src) => { document.getElementById('zoomImg').src = src; document.getElementById('zoomModal').style.display = 'flex'; };
</script>
</body>
</html>
